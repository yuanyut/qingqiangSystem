server:
  port: 8081

# 自定义配置
app:
  domain: ${APP_DOMAIN:http://localhost:8081}
  # 文件上传路径配置（支持环境变量）
  upload:
    path: /usr/share/nginx/html/upload
    # 静态资源访问路径前缀
    url-prefix: /upload
    # 生产环境返回完整URL
    use-full-url: ${UPLOAD_USE_FULL_URL:false}

spring:
  application:
    name: serve
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/qinqiang?useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mvc:
    static-path-pattern: /static/**
  web:
    resources:
      static-locations: classpath:/static/

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.qqsystem.serve.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true